spring.application.name=api
server.port=8080

# Database: the defaults below are for LOCAL dev. In production (Raspberry Pi) the real values
# come from environment variables set on the Portainer stack (DB_URL, DB_USERNAME, DB_PASSWORD).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/climbbeta_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# MinIO (image storage): same idea, local defaults with production values injected via env vars.
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minio_admin}
minio.secret-key=${MINIO_SECRET_KEY:minio_local_dev}
minio.bucket-name=${MINIO_BUCKET:climbbeta-media}

# Upload size limit (20MB)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

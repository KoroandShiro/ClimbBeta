# Usar a driver especial do Testcontainers que levanta o Postgres automaticamente
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///climbbeta_test_db
spring.datasource.username=test
spring.datasource.password=test

# Correr o ficheiro SQL para criar o schema sempre que a base de testes arranca
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-schema.sql
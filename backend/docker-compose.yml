version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: climbbeta-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: climbbeta_db
    ports:
      - "5432:5432"
    volumes:
      - climbbeta-db-data:/var/lib/postgresql/data

  # Opcional: Se não quiseres usar o pgAdmin que tens instalado no PC,
  # o Docker também pode levantar um pgAdmin na Web!
  pgadmin:
    image: dpage/pgadmin4
    container_name: climbbeta-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@climbbeta.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  climbbeta-db-data:
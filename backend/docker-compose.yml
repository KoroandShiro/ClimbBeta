services:
  db:
    image: postgres:15-alpine
    container_name: climbbeta-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: climbbeta_db
    ports:
      - "5432:5432"
    volumes:
      - climbbeta-db-data:/var/lib/postgresql/data
      - ./src/main/resources/sql/create-schema.sql:/docker-entrypoint-initdb.d/init.sql

  # Opcional: Se não quiseres usar o pgAdmin que tens instalado no PC,
  # o Docker também pode levantar um pgAdmin na Web!
  pgadmin:
    image: dpage/pgadmin4
    container_name: climbbeta-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@climbbeta.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: climbbeta-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - climbbeta-minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  climbbeta-db-data:
  climbbeta-minio-data: